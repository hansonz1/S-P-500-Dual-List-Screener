name: Daily screen

on:
  schedule:
    # 21:35 UTC Mon-Fri = shortly after the 16:00 ET close (EDT). Adjust to
    # 22:35 during standard time if you want the same local offset.
    - cron: "35 21 * * 1-5"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run screen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # optional
        run: python run.py

      - name: Commit results
        run: |
          git config user.name "screen-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output/
          git commit -m "Daily screen $(date -u +%F)" || echo "nothing to commit"
          git push
